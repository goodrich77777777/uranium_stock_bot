name: Daily Uranium Report

on:
  schedule:
    # 한국 시간(KST) 오전 7시는 UTC(세계 표준시)로 전날 오후 10시입니다.
    - cron: '0 22 * * *'
  workflow_dispatch: # 수동으로 실행해볼 수 있는 버튼을 만듭니다.

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v3

    - name: 파이썬 설정
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 필수 라이브러리 설치
      run: |
        pip install python-telegram-bot yfinance deep_translator beautifulsoup4 pytz

    - name: 봇 실행
      run: python uranium_bot.
